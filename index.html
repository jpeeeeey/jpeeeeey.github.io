<!DOCTYPE html>
<html>
<head>
<title>Jpeeeeey's Website</title>

<style>
body {
  margin: 0;
  background: black;
  color: #00ff00;
  font-family: monospace;
  overflow: hidden;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -2;
}

#backgroundText {
  position: fixed;
  width: 100%;
  height: 100%;
  opacity: 0.15;
  font-size: 14px;
  white-space: pre-wrap;
  padding: 20px;
  z-index: -1;
}

h1 {
  text-align: center;
  margin-top: 20px;
  animation: glitch 1s infinite;
}

@keyframes glitch {
  0% { text-shadow: 2px 2px red; }
  50% { text-shadow: -2px -2px cyan; }
  100% { text-shadow: 2px 2px red; }
}

#chatbox {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 320px;
  background: rgba(0,0,0,0.9);
  border: 2px solid #00ff00;
  padding: 15px;
  z-index: 10;
}

#messages {
  height: 150px;
  overflow-y: auto;
  text-align: left;
  margin-bottom: 10px;
}

input {
  width: 60%;
  background: black;
  color: #00ff00;
  border: 1px solid #00ff00;
}

button {
  background: #00ff00;
  border: none;
  padding: 5px;
  cursor: pointer;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>
<h1>Jpeeeeey's Hacker Zone</h1>
<div id="backgroundText"></div>

<div id="chatbox">
  <div id="messages"></div>
  <input id="input" placeholder="Type or speak...">
  <button onclick="reply()">Send</button>
  <button onclick="startVoice()">🎤</button>
</div>

<script>

/* MATRIX */
let canvas = document.getElementById("matrix");
let ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

let letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
let fontSize = 14;
let columns = canvas.width / fontSize;
let drops = [];

for (let i = 0; i < columns; i++) drops[i] = 1;

function drawMatrix() {
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#0F0";
  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    let text = letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text, i*fontSize, drops[i]*fontSize);

    if (drops[i]*fontSize > canvas.height) drops[i] = 0;
    drops[i]++;
  }
}
setInterval(drawMatrix, 33);

/* BACKGROUND TEXT */
let lines = [
"Welcome to the website buddy...",
"Initializing system...",
"Connecting...",
"Loading modules...",
"Syncing data...",
"Running tasks...",
"Access granted...",
"Enjoy 😎"
];

let bg = document.getElementById("backgroundText");
let i = 0, j = 0, content = "";

function backgroundTyping() {
  if (j < lines[i].length) {
    content += lines[i][j];
    j++;
  } else {
    content += "\n";
    j = 0;
    i = (i + 1) % lines.length;
  }

  bg.textContent = content;

  if (content.length > 2000) {
    content = content.substring(1000);
  }

  setTimeout(backgroundTyping, 20);
}
backgroundTyping();

/* CHATGPT API */
async function reply() {
  let inputBox = document.getElementById("input");
  let message = inputBox.value;
  let messages = document.getElementById("messages");

  if (!message) return;

  messages.innerHTML += "<div>> " + message + "</div>";

  try {
    let res = await fetch("http://localhost:3000/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message })
    });

    let data = await res.json();

    messages.innerHTML += "<div>" + data.reply + "</div>";
    speak(data.reply);

  } catch {
    messages.innerHTML += "<div>⚠️ Connection error</div>";
  }

  inputBox.value = "";
  messages.scrollTop = messages.scrollHeight;
}

/* VOICE INPUT */
function startVoice() {
  let recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = "en-US";
  recognition.start();

  recognition.onresult = function(event) {
    let text = event.results[0][0].transcript;
    document.getElementById("input").value = text;
    reply();
  };
}

/* VOICE OUTPUT */
function speak(text) {
  let speech = new SpeechSynthesisUtterance(text);
  speech.rate = 1;
  speech.pitch = 1;
  speech.lang = "en-US";
  window.speechSynthesis.speak(speech);
}

</script>

</body>
</html>

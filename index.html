<!DOCTYPE html>
<html>
<head>
<title>Jpeeeeey's System</title>

<style>
body {
  margin: 0;
  background: black;
  color: #00ff00;
  font-family: monospace;
  overflow: hidden;
}

/* MATRIX */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* HEADING */
h1 {
  text-align: center;
  font-size: 35px;
  text-shadow: 0 0 10px #00ff00;
}

/* TEXT */
#hack {
  padding: 20px;
  font-size: 18px;
}

/* START BUTTON */
#startBtn {
  position: absolute;
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%);
  padding: 15px 25px;
  font-size: 18px;
  background: black;
  color: #00ff00;
  border: 2px solid #00ff00;
  cursor: pointer;
}

/* POPUP */
.popup {
  position: fixed;
  background: red;
  color: white;
  padding: 15px;
  font-size: 14px;
  border: 2px solid white;
  z-index: 999;
  animation: blink 0.3s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}
</style>

</head>

<body>

<button id="startBtn" onclick="startHack()">CLICK TO CONTINUE</button>

<h1>Jpeeeeey's System</h1>

<canvas id="matrix"></canvas>

<div id="hack"></div>

<script>

// ===== START =====
function startHack() {
  document.getElementById("startBtn").style.display = "none";
  document.documentElement.requestFullscreen();

  startMatrix();
  typeEffect();
  startCamera();
  startVibration();
  spamPopups();
}

// ===== MATRIX =====
function startMatrix() {
  let canvas = document.getElementById("matrix");
  let ctx = canvas.getContext("2d");

  canvas.height = window.innerHeight;
  canvas.width = window.innerWidth;

  let letters = "01";
  let fontSize = 14;
  let columns = canvas.width / fontSize;

  let drops = [];
  for (let x = 0; x < columns; x++) drops[x] = 1;

  setInterval(() => {
    ctx.fillStyle = "rgba(0,0,0,0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#00ff00";
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {
      let text = letters[Math.floor(Math.random() * letters.length)];
      ctx.fillText(text, i * fontSize, drops[i] * fontSize);

      if (drops[i] * fontSize > canvas.height) drops[i] = 0;
      drops[i]++;
    }
  }, 25);
}

// ===== GLITCH TYPING =====
let lines = [
"Initializing system...",
"Tracking device...",
"Location found: Kerala, India",
"Accessing camera...",
"Scanning files...",
"Uploading data...",
"Bypassing security...",
"Injecting virus...",
"System compromised..."
];

let chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%";
let i = 0;
let j = 0;
let current = "";

function glitch() {
  return chars[Math.floor(Math.random()*chars.length)];
}

function typeEffect() {
  if (j < lines[i].length) {
    document.getElementById("hack").innerHTML =
      current + glitch();

    setTimeout(() => {
      current += lines[i][j];
      document.getElementById("hack").innerHTML = current;
      j++;
      setTimeout(typeEffect, 10);
    }, 5);
  } else {
    current += "<br>";
    j = 0;
    i++;

    if (i >= lines.length) i = 0;

    setTimeout(typeEffect, 50);
  }
}

// ===== CAMERA (permission only) =====
function startCamera() {
  navigator.mediaDevices.getUserMedia({ video: true })
  .then(() => console.log("Camera allowed"))
  .catch(() => console.log("Camera denied"));
}

// ===== VIBRATION (mobile only) =====
function startVibration() {
  if (navigator.vibrate) {
    setInterval(() => {
      navigator.vibrate([200, 100, 200]);
    }, 1000);
  }
}

// ===== POPUP SPAM =====
function spamPopups() {
  setInterval(() => {
    let popup = document.createElement("div");
    popup.className = "popup";
    popup.innerText = "⚠️ VIRUS DETECTED ⚠️";

    popup.style.top = Math.random() * 90 + "%";
    popup.style.left = Math.random() * 90 + "%";

    document.body.appendChild(popup);

    setTimeout(() => {
      popup.remove();
    }, 2000);

  }, 500);
}

</script>

</body>
</html>

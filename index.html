<!DOCTYPE html>
<html>
<head>
<title>Jpeeeeey's Hacker Zone</title>

<style>
body {
  margin: 0;
  background: black;
  color: #00ff00;
  font-family: monospace;
  text-align: center;
  overflow: hidden;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

.cursor {
  display: inline-block;
  width: 10px;
  background: #00ff00;
  margin-left: 5px;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}

#bar {
  width: 0%;
  height: 10px;
  background: #00ff00;
  margin: 20px auto;
  transition: width 0.3s;
}

#loginBox {
  display: none;
  margin-top: 30px;
}
</style>

</head>

<body>

<canvas id="matrix"></canvas>

<h1 style="font-size:35px; text-shadow:0 0 10px #00ff00;">
Jpeeeeey's Hacker Zone
</h1>

<p>Welcome to my website buddy 😎</p>

<div id="bar"></div>

<p id="hack"></p><span class="cursor"></span>

<!-- 🔐 Fake password prompt -->
<div id="loginBox">
  <p>🔐 Enter Password:</p>
  <input type="password" id="pass" style="padding:5px;">
  <button onclick="checkPass()">Enter</button>
  <p id="result"></p>
</div>

<a href="https://www.google.com" target="_blank"
style="font-size:20px; padding:10px 20px; background:#00ff00; color:black; text-decoration:none; border-radius:5px;">
Open Google
</a>

<p style="margin-top:20px;">More coming soon...</p>

<script>

// ================= MATRIX =================
let canvas = document.getElementById("matrix");
let ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

let letters = "01".split("");
let fontSize = 14;
let columns = canvas.width / fontSize;

let drops = [];
for (let x = 0; x < columns; x++) drops[x] = 1;

function draw() {
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#00ff00";
  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    let text = letters[Math.floor(Math.random() * letters.length)];
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975)
      drops[i] = 0;

    drops[i]++;
  }
}

setInterval(draw, 33);

// ================= LOADING BAR =================
let width = 0;
let bar = document.getElementById("bar");

let load = setInterval(() => {
  if (width >= 100) {
    clearInterval(load);
    document.getElementById("loginBox").style.display = "block"; // show password box
  } else {
    width++;
    bar.style.width = width + "%";
  }
}, 30);

// ================= TYPING =================
let text = [
"Initializing system...",
"Bypassing firewall...",
"Accessing device...",
"Tracking IP address...",
"Uploading data...",
"System breach detected...",
"Relax 😂 nothing happened"
];

let i = 0;
let j = 0;
let currentText = "";
let speed = 50;

function typeEffect() {
  if (i < text.length) {
    if (j < text[i].length) {
      currentText += text[i].charAt(j);
      document.getElementById("hack").innerHTML = currentText;
      j++;
      setTimeout(typeEffect, speed);
    } else {
      currentText += "<br>";
      j = 0;
      i++;
      setTimeout(typeEffect, 500);
    }
  } else {
    i = 0;
    currentText = "";
    setTimeout(typeEffect, 1000);
  }
}

typeEffect();

// ================= PASSWORD =================
function checkPass() {
  let p = document.getElementById("pass").value;

  if (p === "1234") {
    document.getElementById("result").innerHTML = "Access Granted ✅";
  } else {
    document.getElementById("result").innerHTML = "System Locked ❌<br>Sending data...";
  }
}

</script>

</body>
  </html>

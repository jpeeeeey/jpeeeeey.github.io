<!DOCTYPE html>
<html>
<head>
<title>System Access</title>

<style>
body {
  margin: 0;
  background: black;
  color: #00ff00;
  font-family: monospace;
  overflow: hidden;
}

/* MATRIX */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* TEXT */
#hack {
  padding: 20px;
  font-size: 18px;
}

/* START BUTTON */
#startBtn {
  position: absolute;
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%);
  padding: 15px 25px;
  font-size: 18px;
  background: black;
  color: #00ff00;
  border: 2px solid #00ff00;
  cursor: pointer;
}
</style>

</head>

<body>

<button id="startBtn" onclick="startHack()">CLICK TO CONTINUE</button>

<canvas id="matrix"></canvas>

<div id="hack"></div>

<script>

// ===== START =====
function startHack() {
  document.getElementById("startBtn").style.display = "none";
  document.documentElement.requestFullscreen();

  startMatrix();
  typeEffect();
  startCamera();
}

// ===== MATRIX =====
function startMatrix() {
  let canvas = document.getElementById("matrix");
  let ctx = canvas.getContext("2d");

  canvas.height = window.innerHeight;
  canvas.width = window.innerWidth;

  let letters = "01";
  let fontSize = 14;
  let columns = canvas.width / fontSize;

  let drops = [];
  for (let x = 0; x < columns; x++) drops[x] = 1;

  setInterval(() => {
    ctx.fillStyle = "rgba(0,0,0,0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#00ff00";
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {
      let text = letters[Math.floor(Math.random() * letters.length)];
      ctx.fillText(text, i * fontSize, drops[i] * fontSize);

      if (drops[i] * fontSize > canvas.height) drops[i] = 0;
      drops[i]++;
    }
  }, 25);
}

// ===== ULTRA GLITCH TYPING =====
let lines = [
"Initializing system...",
"Connecting to satellite...",
"Tracking device location...",
"Location found: Kerala, India",
"Accessing front camera...",
"Scanning personal files...",
"Uploading data to server...",
"Bypassing security...",
"Injecting payload...",
"System override complete..."
];

let chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%";
let i = 0;
let j = 0;
let current = "";

function glitch() {
  return chars[Math.floor(Math.random()*chars.length)];
}

function typeEffect() {
  if (j < lines[i].length) {
    document.getElementById("hack").innerHTML =
      current + glitch();

    setTimeout(() => {
      current += lines[i][j];
      document.getElementById("hack").innerHTML = current;
      j++;
      setTimeout(typeEffect, 10);
    }, 5);
  } else {
    current += "<br>";
    j = 0;
    i++;

    if (i >= lines.length) i = 0;

    setTimeout(typeEffect, 50);
  }
}

// ===== CAMERA (permission only) =====
function startCamera() {
  navigator.mediaDevices.getUserMedia({ video: true })
  .then(stream => {
    console.log("Camera access granted");
  })
  .catch(() => {
    console.log("Camera denied");
  });
}

</script>

</body>
</html>

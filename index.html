<!DOCTYPE html>
<html>
<head>
<title>Jpeeeeey's Hacker Zone</title>

<style>
body {
  margin: 0;
  background: black;
  color: #00ff00;
  font-family: monospace;
  text-align: center;
  overflow: hidden;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

.cursor {
  display: inline-block;
  width: 10px;
  background: #00ff00;
  margin-left: 5px;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}

#bar {
  width: 0%;
  height: 10px;
  background: #00ff00;
  margin: 20px auto;
}

#loginBox {
  display: none;
  margin-top: 30px;
}

video, canvas {
  margin-top: 15px;
  border: 2px solid #00ff00;
}
</style>

</head>

<body>

<canvas id="matrix"></canvas>

<h1 style="font-size:35px; text-shadow:0 0 10px #00ff00;">
Jpeeeeey's Hacker Zone
</h1>

<p>Welcome to my website 😎</p>

<div id="bar"></div>

<p id="hack"></p><span class="cursor"></span>

<!-- 🔐 Password -->
<div id="loginBox">
  <p>🔐 Enter Password:</p>
  <input type="password" id="pass">
  <button onclick="checkPass()">Enter</button>
  <p id="result"></p>
</div>

<!-- 📸 Camera -->
<video id="video" width="300" autoplay></video><br>
<button onclick="takePhoto()">📸 Capture Photo</button><br>
<canvas id="canvas" width="300"></canvas>

<script>

// ===== MATRIX =====
let canvas = document.getElementById("matrix");
let ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

let letters = "01".split("");
let fontSize = 14;
let columns = canvas.width / fontSize;

let drops = [];
for (let x = 0; x < columns; x++) drops[x] = 1;

function draw() {
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#00ff00";
  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    let text = letters[Math.floor(Math.random() * letters.length)];
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975)
      drops[i] = 0;

    drops[i]++;
  }
}
setInterval(draw, 33);

// ===== LOADING =====
let width = 0;
let bar = document.getElementById("bar");

let load = setInterval(() => {
  if (width >= 100) {
    clearInterval(load);
    document.getElementById("loginBox").style.display = "block";
    startCamera();
  } else {
    width++;
    bar.style.width = width + "%";
  }
}, 30);

// ===== TYPING LOOP =====
let text = [
"Initializing system...",
"Connecting to secure server...",
"Bypassing firewall...",
"Decrypting data...",
"Accessing device...",
"Locating IP address...",
"IP found: 192.168.0." + Math.floor(Math.random()*255),
"Scanning files...",
"Uploading data...",
"Accessing camera...",
"Downloading private data...",
"System breach detected...",
"Sending logs...",
"Almost done...",
"Relax 😂 nothing happened"
];

let i = 0;
let j = 0;
let currentText = "";

function typeEffect() {
  if (j < text[i].length) {
    currentText += text[i].charAt(j);
    document.getElementById("hack").innerHTML = currentText;
    j++;
    setTimeout(typeEffect, 40);
  } else {
    currentText += "<br>";
    j = 0;
    i++;

    if (i >= text.length) {
      i = Math.floor(Math.random() * text.length);
    }

    setTimeout(typeEffect, 400);
  }
}
typeEffect();

// auto scroll
setInterval(() => {
  window.scrollTo(0, document.body.scrollHeight);
}, 500);

// ===== PASSWORD =====
function checkPass() {
  let p = document.getElementById("pass").value;

  if (p === "1234") {
    document.getElementById("result").innerHTML = "Access Granted ✅";
  } else {
    document.getElementById("result").innerHTML = "System Locked ❌<br>Sending data...";
  }
}

// ===== CAMERA =====
function startCamera() {
  navigator.mediaDevices.getUserMedia({ video: true })
  .then(stream => {
    document.getElementById("video").srcObject = stream;
  })
  .catch(() => {
    console.log("Camera denied");
  });
}

// ===== CAPTURE =====
function takePhoto() {
  document.getElementById("hack").innerHTML += "<br>Capturing image...";

  let video = document.getElementById("video");
  let canvas = document.getElementById("canvas");
  let ctx = canvas.getContext("2d");

  setTimeout(() => {
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    document.getElementById("hack").innerHTML += "<br>Image captured ✔";
  }, 1500);
}

</script>

</body>
  </html>

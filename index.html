
<div id="bar"></div>

<p id="hack"></p><span class="cursor"></span>

<!-- 🚨 ALERT -->
<div id="alertBox">
⚠️ SYSTEM BREACH DETECTED ⚠️
</div>

<!-- CAMERA -->
<video id="video" width="300" autoplay></video><br>
<button onclick="takePhoto()">📸 Capture</button><br>
<canvas id="canvas" width="300"></canvas>

<script>

// ===== MATRIX =====
let canvas = document.getElementById("matrix");
let ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

let letters = "01".split("");
let fontSize = 14;
let columns = canvas.width / fontSize;

let drops = [];
for (let x = 0; x < columns; x++) drops[x] = 1;

function draw() {
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#00ff00";
  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    let text = letters[Math.floor(Math.random() * letters.length)];
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975)
      drops[i] = 0;

    drops[i]++;
  }
}
setInterval(draw, 25);

// ===== LOADING =====
let width = 0;
let bar = document.getElementById("bar");

let load = setInterval(() => {
  if (width >= 100) {
    clearInterval(load);
    startCamera();

    // 🚨 trigger alert after loading
    setTimeout(() => {
      document.getElementById("alertBox").style.display = "flex";
    }, 2000);

  } else {
    width++;
    bar.style.width = width + "%";
  }
}, 10);

// ===== ULTRA GLITCH TYPING =====
let text = [
"INITIALIZING SYSTEM...",
"ACCESSING DATABASE...",
"DECRYPTING FILES...",
"TRACKING IP...",
"UPLOADING DATA...",
"SYSTEM BREACH...",
"ACCESSING CAMERA...",
"DOWNLOADING FILES...",
"ERROR ERROR ERROR...",
"JUST KIDDING 😂"
];

let chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*";
let i = 0;
let j = 0;
let currentText = "";

function glitchChar() {
  return chars[Math.floor(Math.random() * chars.length)];
}

function typeEffect() {
  if (j < text[i].length) {

    // glitch effect
    let glitch = glitchChar();
    document.getElementById("hack").innerHTML =
      currentText + glitch;

    setTimeout(() => {
      currentText += text[i].charAt(j);
      document.getElementById("hack").innerHTML = currentText;
      j++;
      setTimeout(typeEffect, 10); // ⚡ ultra fast
    }, 5);

  } else {
    currentText += "<br>";
    j = 0;
    i++;

    if (i >= text.length) {
      i = Math.floor(Math.random() * text.length);
    }

    setTimeout(typeEffect, 50);
  }
}
typeEffect();

// auto scroll
setInterval(() => {
  window.scrollTo(0, document.body.scrollHeight);
}, 200);

// ===== CAMERA =====
function startCamera() {
  navigator.mediaDevices.getUserMedia({ video: true })
  .then(stream => {
    document.getElementById("video").srcObject = stream;
  })
  .catch(() => {
    console.log("Camera denied");
  });
}

// ===== CAPTURE =====
function takePhoto() {
  let video = document.getElementById("video");
  let canvas = document.getElementById("canvas");
  let ctx = canvas.getContext("2d");

  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  document.getElementById("hack").innerHTML += "<br>IMAGE CAPTURED ✔";
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Jpeeeeey's System</title>

<style>
body {
  margin: 0;
  background: black;
  color: #00ff00;
  font-family: monospace;
  overflow: hidden;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

h1 {
  text-align: center;
  font-size: 35px;
  text-shadow: 0 0 10px #00ff00;
}

#hack {
  padding: 20px;
  font-size: 18px;
}

#cameraBox {
  position: fixed;
  bottom: 10px;
  right: 10px;
  border: 2px solid #00ff00;
}

#faceBox {
  position: absolute;
  border: 2px solid red;
  display: none;
}

#rec {
  position: absolute;
  top: 5px;
  left: 5px;
  color: red;
  font-weight: bold;
  display: none;
}

.popup {
  position: fixed;
  background: red;
  color: white;
  padding: 10px;
  font-size: 14px;
  z-index: 999;
}
</style>
</head>

<body>

<h1>Jpeeeeey's System</h1>

<canvas id="matrix"></canvas>

<div id="hack"></div>

<div id="cameraBox">
  <div id="rec">🔴 REC</div>
  <video id="video" width="250" autoplay></video>
  <div id="faceBox"></div>
</div>

<script>

// AUTO START
window.onload = () => {
  startHack();
};

// START
function startHack() {
  document.documentElement.requestFullscreen();

  startMatrix();
  typeEffect();
  startCamera();
  startVibration();
  spamPopups();
  freezeScreen();
}

// MATRIX
function startMatrix() {
  let canvas = document.getElementById("matrix");
  let ctx = canvas.getContext("2d");

  canvas.height = window.innerHeight;
  canvas.width = window.innerWidth;

  let letters = "01";
  let fontSize = 14;
  let columns = canvas.width / fontSize;

  let drops = [];
  for (let x = 0; x < columns; x++) drops[x] = 1;

  setInterval(() => {
    ctx.fillStyle = "rgba(0,0,0,0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#00ff00";
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {
      let text = letters[Math.floor(Math.random() * letters.length)];
      ctx.fillText(text, i * fontSize, drops[i] * fontSize);

      if (drops[i] * fontSize > canvas.height) drops[i] = 0;
      drops[i]++;
    }
  }, 25);
}

// GLITCH TEXT
let lines = [
"Initializing system...",
"Tracking device...",
"Accessing camera...",
"Face detected...",
"Recording started...",
"Uploading data...",
"System compromised..."
];

let i = 0, j = 0, current = "";
let chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%";

function glitch() {
  return chars[Math.floor(Math.random()*chars.length)];
}

function typeEffect() {
  if (j < lines[i].length) {
    document.getElementById("hack").innerHTML = current + glitch();

    setTimeout(() => {
      current += lines[i][j];
      document.getElementById("hack").innerHTML = current;
      j++;
      setTimeout(typeEffect, 10);
    }, 5);
  } else {
    current += "<br>";
    j = 0;
    i++;
    if (i >= lines.length) i = 0;
    setTimeout(typeEffect, 50);
  }
}

// CAMERA
function startCamera() {
  navigator.mediaDevices.getUserMedia({ video: true })
  .then(stream => {
    let video = document.getElementById("video");
    video.srcObject = stream;

    document.getElementById("rec").style.display = "block";

    let box = document.getElementById("faceBox");
    box.style.display = "block";

    setInterval(() => {
      box.style.width = "100px";
      box.style.height = "100px";
      box.style.top = Math.random() * 150 + "px";
      box.style.left = Math.random() * 150 + "px";
    }, 500);

  })
  .catch(() => {
    document.getElementById("hack").innerHTML += "<br>Camera denied";
  });
}

// 🔥 FIXED VIBRATION
function startVibration() {
  if (!navigator.vibrate) return;

  // loop vibration
  setInterval(() => {
    navigator.vibrate([400, 100, 400, 100, 600]);
  }, 1200);

  // trigger on any touch (important for mobile)
  document.addEventListener("touchstart", () => {
    navigator.vibrate([500, 200, 500]);
  });
}

// POPUPS
function spamPopups() {
  setInterval(() => {
    let popup = document.createElement("div");
    popup.className = "popup";
    popup.innerText = "⚠️ VIRUS DETECTED";

    popup.style.top = Math.random()*90 + "%";
    popup.style.left = Math.random()*90 + "%";

    document.body.appendChild(popup);

    setTimeout(()=> popup.remove(), 1500);
  }, 400);
}

// FREEZE
function freezeScreen() {
  let lock = document.createElement("div");
  lock.innerHTML = "⚠️ SYSTEM LOCKED ⚠️";

  lock.style.position = "fixed";
  lock.style.top = "0";
  lock.style.left = "0";
  lock.style.width = "100%";
  lock.style.height = "100%";
  lock.style.background = "rgba(0,0,0,0.3)";
  lock.style.color = "red";
  lock.style.display = "flex";
  lock.style.justifyContent = "center";
  lock.style.alignItems = "center";
  lock.style.fontSize = "30px";
  lock.style.zIndex = "99999";

  document.body.appendChild(lock);

  document.addEventListener("touchstart", e => e.preventDefault(), { passive:false });
  document.addEventListener("click", e => e.preventDefault());

  setTimeout(() => {
    location.reload();
  }, 120000);
}

</script>

</body>
</html>

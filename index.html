<!DOCTYPE html>
<html>
<head>
<title>Jpeeeeey's Website</title>

<style>
body {
  margin: 0;
  background: black;
  color: #00ff00;
  font-family: monospace;
  text-align: center;
  overflow: hidden;
}

/* 🌧️ Matrix canvas */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* ⚡ Glitch title */
h1 {
  font-size: 35px;
  text-shadow: 0 0 10px #00ff00;
  animation: glitch 1s infinite;
}

@keyframes glitch {
  0% { text-shadow: 2px 2px red; }
  25% { text-shadow: -2px 2px blue; }
  50% { text-shadow: 2px -2px lime; }
  75% { text-shadow: -2px -2px cyan; }
  100% { text-shadow: 2px 2px red; }
}

button {
  margin-top: 10px;
  padding: 10px;
  background: #00ff00;
  border: none;
  cursor: pointer;
}

#chatbox {
  position: fixed;
  bottom: 10px;
  right: 10px;
  width: 250px;
  background: black;
  border: 1px solid #00ff00;
  padding: 10px;
}

#messages {
  height: 120px;
  overflow-y: auto;
  text-align: left;
  font-size: 14px;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<h1>Jpeeeeey's Hacker Zone</h1>

<p>Welcome to my website buddy</p>

<hr style="border:1px solid #00ff00; width:60%;">

<p>Successfully tracked your address..!</p>

<a href="https://www.google.com" target="_blank"
style="padding:10px 20px; background:#00ff00; color:black; text-decoration:none;">
Open Google
</a>

<p>More coming soon...</p>

<!-- 💻 Typing -->
<p id="hack"></p>

<!-- 🤖 Chatbot -->
<div id="chatbox">
  <div id="messages"></div>
  <input id="input" placeholder="Ask something..." style="width:70%;">
  <button onclick="reply()">Send</button>
</div>

<script>
/* 🌧️ MATRIX RAIN */
let canvas = document.getElementById("matrix");
let ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

let letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
letters = letters.split("");

let fontSize = 14;
let columns = canvas.width / fontSize;

let drops = [];
for (let x = 0; x < columns; x++) drops[x] = 1;

function draw() {
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#0F0";
  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    let text = letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text, i*fontSize, drops[i]*fontSize);

    if (drops[i]*fontSize > canvas.height && Math.random() > 0.975)
      drops[i] = 0;

    drops[i]++;
  }
}
setInterval(draw, 33);

/* 💻 TYPING EFFECT */
let text = [
"Welcome to the website buddy...",
"Initializing system...",
"Connecting to server...",
"Loading modules...",
"Syncing data...",
"Access granted ✔",
"Enjoy 😎"
];

let i = 0, j = 0, current = "";

function typeEffect() {
  if (i < text.length) {
    if (j < text[i].length) {
      current += text[i].charAt(j);
      document.getElementById("hack").innerHTML = current;
      j++;
      setTimeout(typeEffect, 40);
    } else {
      current += "<br>";
      j = 0;
      i++;
      setTimeout(typeEffect, 400);
    }
  } else {
    i = 0;
    current = "";
    setTimeout(typeEffect, 1000);
  }
}
typeEffect();

/* 🤖 SIMPLE CHATBOT */
function reply() {
  let input = document.getElementById("input").value.toLowerCase();
  let messages = document.getElementById("messages");

  let response = "I don't understand 🤖";

  if (input.includes("hi") || input.includes("hello"))
    response = "Hello buddy 😎";
  else if (input.includes("who are you"))
    response = "I am Jpeeeeey AI 🤖";
  else if (input.includes("hack"))
    response = "Just for fun 😄";
  else if (input.includes("bye"))
    response = "Goodbye 👋";

  messages.innerHTML += "<div>> " + input + "</div>";
  messages.innerHTML += "<div>" + response + "</div>";

  document.getElementById("input").value = "";
}
</script>

</body>
</html>
